name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write  # required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: specula-linux-amd64
          - goos: linux
            goarch: arm64
            asset: specula-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: specula-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: specula-darwin-arm64   # Apple Silicon
          - goos: windows
            goarch: amd64
            asset: specula-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.asset }} \
            ./cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Specula ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
          generate_release_notes: true
          files: dist/*
